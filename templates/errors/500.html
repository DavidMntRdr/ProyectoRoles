<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitta Corp - Incidencia del Sistema</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .error-card {
            background: white;
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            max-width: 450px;
            border-top: 5px solid #e53e3e; /* Color rojo corporativo para errores críticos */
        }
        .icon-box {
            font-size: 60px;
            color: #e53e3e;
            margin-bottom: 20px;
        }
        .error-title {
            font-size: 24px;
            font-weight: 700;
            color: #2d3748;
            margin-bottom: 15px;
        }
        .error-text {
            color: #718096;
            margin-bottom: 30px;
            line-height: 1.6;
        }
        .btn-home {
            background: linear-gradient(135deg, #e53e3e, #b91c1c);
            border: none;
            padding: 12px 35px;
            border-radius: 10px;
            color: white;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s ease;
            font-weight: 600;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(229, 62, 62, 0.3);
            color: white;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="icon-box">
            <i class="bi bi-gear-fill"></i>
        </div>
        <h2 class="error-title">Incidencia en el servicio</h2>
        <p class="error-text">
            Hemos detectado un inconveniente técnico al procesar su solicitud. 
        <a href="/dashboard/" class="btn-home">
            <i></i> Reintentar acceso
        </a>
    </div>
</body>
</html>
