{% extends 'base.html' %}
{% block title %}Usuarios - Vitta Corp{% endblock %}

{% block breadcrumb %}
<li class="breadcrumb-item active">Gestión de Usuarios</li>
{% endblock %}

{% block content %}
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
    .pagination-modern .page-link {
        color: #333 !important;
        border: 1px solid #ccc !important;
        background-color: #fff !important;
    }
    .pagination-modern .page-item.active .page-link {
        background-color: #0d6efd !important;
        border-color: #0d6efd !important;
        color: #fff !important;
    }
    .pagination-modern .page-item.disabled .page-link {
        color: #999 !important;
        background-color: #f9f9f9 !important;
    }
    @media (max-width: 768px) {
        .card-header-modern {
            flex-direction: column;
        }
        .card-header-modern .btn {
            width: 100%;
        }
        .filtros-container {
            flex-direction: column;
        }
        .filtros-container .form-control,
        .filtros-container .form-select {
            width: 100% !important;
        }
        .table-modern td, .table-modern th {
            white-space: nowrap;
        }
    }
</style>

<div class="card-modern">
    <div class="card-header-modern d-flex justify-content-between align-items-center flex-wrap gap-2">
        <h4 class="mb-0"><i class="bi bi-people"></i> Gestión de Usuarios</h4>
        <a href="{% url 'usuario_nuevo' %}" class="btn btn-success" id="btnNuevoUsuario">
            <i class="bi bi-plus-circle"></i> Nuevo Usuario
        </a>
    </div>
    <div class="card-body">
        <div class="mb-3 d-flex justify-content-between align-items-center flex-wrap gap-2 filtros-container">
            <input type="text" id="searchInput" class="form-control" style="width: 250px;" placeholder="Buscar por nombre..." onkeyup="aplicarFiltros()">
            <select id="estadoFilter" class="form-select" style="width: 180px;" onchange="aplicarFiltros()">
                <option value="">Todos los estados</option>
                <option value="true">Activos</option>
                <option value="false">Inactivos</option>
            </select>
            <span id="contadorRegistros" class="badge bg-light text-dark border"></span>
        </div>
        
        <div class="table-responsive">
            <table class="table table-modern">
                <thead>
                    <tr>
                        <th>Foto</th>
                        <th>Usuario</th>
                        <th>Correo</th>
                        <th>Perfil</th>
                        <th>Celular</th>
                        <th>Estado</th>
                        <th class="text-center">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tabla-usuarios"></tbody>
            </table>
        </div>
        
        <div id="paginacion" class="d-flex justify-content-center mt-3"></div>
    </div>
</div>

<script>
    if (window.location.hostname !== '127.0.0.1' && window.location.hostname !== 'localhost') {
        console.log = function() {};
        console.debug = function() {};
        console.info = function() {};
    }

    let listaOriginalUsuarios = [];
    let listaFiltradaUsuarios = [];
    let perfiles = [];
    let paginaActual = 1;
    const itemsPorPagina = 5;
    let filtroNombre = '';
    let filtroEstado = '';

    document.addEventListener('permisosListos', () => {
        const p = window.permisosGlobales['USUARIO'];
        if (p && !p.canAdd) document.getElementById('btnNuevoUsuario')?.remove();
        renderizarTabla();
    });

    async function cargarPerfiles() {
        try {
            const res = await fetch('/api/proxy/Seguridad/perfiles', {
                headers: { 'Authorization': `Bearer ${window.userToken}` }
            });
            if (res.ok) perfiles = await res.json();
        } catch (e) { }
    }

    async function cargarUsuarios() {
        const token = window.userToken;
        try {
            let url = `/api/proxy/Usuario?page=1&pageSize=1000`;
            const res = await fetch(url, {
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (res.ok) {
                const result = await res.json();
                listaOriginalUsuarios = result.data || [];
                aplicarFiltros();
            }
        } catch (error) { }
    }

    function aplicarFiltros() {
        filtroNombre = document.getElementById('searchInput').value.toLowerCase().trim();
        filtroEstado = document.getElementById('estadoFilter').value;
        
        listaFiltradaUsuarios = listaOriginalUsuarios.filter(usuario => {
            let cumpleNombre = true;
            let cumpleEstado = true;
            
            const nombreU = usuario.strNombreUsuario || usuario.str_nombre_usuario || '';
            if (filtroNombre !== '') {
                cumpleNombre = nombreU.toLowerCase().includes(filtroNombre);
            }
            
            if (filtroEstado !== '') {
                const estadoBool = filtroEstado === 'true';
                const estadoU = usuario.idEstadoUsuario !== undefined ? usuario.idEstadoUsuario : usuario.id_estado_usuario;
                cumpleEstado = estadoU === estadoBool;
            }
            
            return cumpleNombre && cumpleEstado;
        });
        
        paginaActual = 1;
        renderizarTabla();
    }

    function renderizarTabla() {
        const p = window.permisosGlobales ? window.permisosGlobales['USUARIO'] : null;
        const tbody = document.getElementById('tabla-usuarios');
        const totalRegistros = listaFiltradaUsuarios.length;
        document.getElementById('contadorRegistros').innerText = `Total: ${totalRegistros}`;
        
        if (listaFiltradaUsuarios.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">No se encontraron usuarios</td></tr>';
            document.getElementById('paginacion').innerHTML = '';
            return;
        }
        
        const inicio = (paginaActual - 1) * itemsPorPagina;
        const paginados = listaFiltradaUsuarios.slice(inicio, inicio + itemsPorPagina);
        
        tbody.innerHTML = paginados.map(u => {
            const nombreU = u.strNombreUsuario || u.str_nombre_usuario || 'Sin nombre';
            const correoU = u.strCorreo || u.str_correo || '-';
            const celularU = u.strNumeroCelular || u.str_numero_celular || '-';
            const estadoU = u.idEstadoUsuario !== undefined ? u.idEstadoUsuario : u.id_estado_usuario;
            const perfilIdU = u.idPerfil || u.id_perfil;
            const imagenU = u.strImagenUrl || u.str_imagen_url;

            const fotoUrl = imagenU ? imagenU : `https://ui-avatars.com/api/?background=667eea&color=fff&bold=true&name=${encodeURIComponent(nombreU)}`;
            const perfilNombre = perfiles.find(pf => pf.id === perfilIdU)?.strNombrePerfil || perfiles.find(pf => pf.id === perfilIdU)?.str_nombre_perfil || 'Cargando...';
            
            return `
                <tr>
                    <td><img src="${fotoUrl}" class="rounded-circle" width="40" height="40" style="object-fit: cover;" onerror="this.src='https://via.placeholder.com/40'"></td>
                    <td><strong>${escapeHtml(nombreU)}</strong></td>
                    <td>${escapeHtml(correoU)}</td>
                    <td><span class="badge bg-secondary">${escapeHtml(perfilNombre)}</span></td>
                    <td>${escapeHtml(celularU)}</td>
                    <td><span class="badge ${estadoU ? 'bg-success' : 'bg-danger'}">${estadoU ? 'Activo' : 'Inactivo'}</span></td>
                    <td class="text-center">
                        <button class="btn btn-sm btn-info me-1" onclick="verDetalle(${u.id})"><i class="bi bi-eye"></i></button>
                        ${p?.canEdit ? `<a href="/usuarios/editar/${u.id}/" class="btn btn-sm btn-warning me-1"><i class="bi bi-pencil"></i></a>` : ''}
                        ${p?.canDelete ? `
                            <button class="btn btn-sm ${estadoU ? 'btn-danger' : 'btn-success'}" onclick="cambiarEstado(${u.id}, ${estadoU})">
                                <i class="bi ${estadoU ? 'bi-ban' : 'bi-check-circle'}"></i>
                            </button>` : ''}
                    </td>
                </tr>`;
        }).join('');
        
        generarPaginacion(totalRegistros);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function generarPaginacion(totalRegistros) {
        const totalPaginas = Math.ceil(totalRegistros / itemsPorPagina);
        const div = document.getElementById('paginacion');
        if (totalPaginas <= 1) { div.innerHTML = ''; return; }

        let html = '<nav><ul class="pagination pagination-modern flex-wrap">';
        
        html += `<li class="page-item ${paginaActual === 1 ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="cambiarPagina(${paginaActual - 1})">Anterior</a>
                 </li>`;

        let startPage = Math.max(1, paginaActual - 2);
        let endPage = Math.min(totalPaginas, paginaActual + 2);
        
        if (startPage > 1) {
            html += `<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="cambiarPagina(1)">1</a></li>`;
            if (startPage > 2) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
        }
        
        for (let i = startPage; i <= endPage; i++) {
            html += `<li class="page-item ${paginaActual === i ? 'active' : ''}">
                        <a class="page-link" href="javascript:void(0)" onclick="cambiarPagina(${i})">${i}</a>
                    </li>`;
        }
        
        if (endPage < totalPaginas) {
            if (endPage < totalPaginas - 1) html += `<li class="page-item disabled"><span class="page-link">...</span></li>`;
            html += `<li class="page-item"><a class="page-link" href="javascript:void(0)" onclick="cambiarPagina(${totalPaginas})">${totalPaginas}</a></li>`;
        }

        html += `<li class="page-item ${paginaActual === totalPaginas ? 'disabled' : ''}">
                    <a class="page-link" href="javascript:void(0)" onclick="cambiarPagina(${paginaActual + 1})">Siguiente</a>
                 </li>`;

        html += '</ul></nav>';
        div.innerHTML = html;
    }

    function cambiarPagina(pagina) {
        const totalPaginas = Math.ceil(listaFiltradaUsuarios.length / itemsPorPagina);
        if (pagina < 1 || pagina > totalPaginas) return;
        paginaActual = pagina;
        renderizarTabla();
    }

    window.verDetalle = function(id) {
        const u = listaOriginalUsuarios.find(x => x.id === id);
        if (u) {
            const nombreU = u.strNombreUsuario || u.str_nombre_usuario || 'Sin nombre';
            const correoU = u.strCorreo || u.str_correo || '-';
            const celularU = u.strNumeroCelular || u.str_numero_celular || '-';
            const estadoU = u.idEstadoUsuario !== undefined ? u.idEstadoUsuario : u.id_estado_usuario;
            const perfilIdU = u.idPerfil || u.id_perfil;
            const imagenU = u.strImagenUrl || u.str_imagen_url;

            const perfil = perfiles.find(p => p.id === perfilIdU)?.strNombrePerfil || perfiles.find(p => p.id === perfilIdU)?.str_nombre_perfil || 'N/A';
            const foto = imagenU ? imagenU : `https://ui-avatars.com/api/?name=${encodeURIComponent(nombreU)}`;
            
            Swal.fire({
                title: 'Detalle del Usuario',
                html: `
                    <div class="text-center mb-3">
                        <img src="${foto}" class="rounded-circle shadow-sm" width="100" height="100" style="object-fit: cover; border: 3px solid #eee;">
                    </div>
                    <div class="text-start">
                        <p><strong>Usuario:</strong> ${escapeHtml(nombreU)}</p>
                        <p><strong>Correo:</strong> ${escapeHtml(correoU)}</p>
                        <p><strong>Perfil:</strong> ${escapeHtml(perfil)}</p>
                        <p><strong>Celular:</strong> ${escapeHtml(celularU)}</p>
                        <p><strong>Estado:</strong> <span class="badge ${estadoU ? 'bg-success' : 'bg-danger'}">${estadoU ? 'Activo' : 'Inactivo'}</span></p>
                    </div>
                `,
                confirmButtonText: 'Cerrar',
                confirmButtonColor: '#4e73df'
            });
        }
    };

    window.cambiarEstado = function(id, estadoActual) {
        const u = listaOriginalUsuarios.find(x => x.id === id);
        const nombreU = u.strNombreUsuario || u.str_nombre_usuario || '';
        const accion = estadoActual ? 'desactivar' : 'activar';
        
        Swal.fire({
            title: `¿Desea ${accion} al usuario?`,
            text: `El usuario "${nombreU}" cambiará su estado.`,
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: estadoActual ? '#d33' : '#28a745',
            cancelButtonColor: '#6c757d',
            confirmButtonText: `Sí, ${accion}`,
            cancelButtonText: 'Cancelar'
        }).then(async (result) => {
            if (result.isConfirmed) {
                try {
                    const res = await fetch(`/api/proxy/Usuario/status/${id}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${window.userToken}`, 'Content-Type': 'application/json' },
                        body: JSON.stringify(!estadoActual)
                    });
                    if (res.ok) {
                        Swal.fire('¡Éxito!', `Usuario ${accion}do.`, 'success');
                        await cargarUsuarios();
                    }
                } catch (e) { Swal.fire('Error', 'No se pudo cambiar el estado', 'error'); }
            }
        });
    };

    document.addEventListener('DOMContentLoaded', async () => {
        await cargarPerfiles();
        await cargarUsuarios();
    });
</script>
{% endblock %}
